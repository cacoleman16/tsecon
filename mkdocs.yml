      - 1. Thinking in Time Series: guide/01-foundations.md
      - 2. Exploring and Diagnosing: guide/02-exploration-and-diagnostics.md
      - 3. Honest Inference: guide/03-inference-toolkit.md
      - 4. Univariate Models: guide/04-univariate-models.md
      - 5. Forecasting: guide/05-forecasting.md
      - 6. Volatility: guide/06-volatility.md
      - 7. Systems (VAR, Factors): guide/07-multivariate.md
      - 8. Structural Identification: guide/08-causal-identification.md
      - 9. Local Projections: guide/09-local-projections.md
      - 10. Bayesian Time Series: guide/10-bayesian.md
      - 11. Nowcasting: guide/11-nowcasting.md
      - 12. Machine Learning: guide/12-machine-learning.md
      - 13. Nonlinear Dynamics: guide/13-nonlinear-dynamics.md
      - 14. Panel Time Series: guide/14-panel-time-series.md
      - 15. Term Structure: guide/15-term-structure.md
  - Reference:
      - Overview: reference/README.md
      - API reference: reference/api.md
      - Results objects: reference/results.md
      - Validation matrix: reference/validation-matrix.md
      - Testing & validation: reference/testing.md
      - Model cards:
          - Diagnostics: reference/model-cards/diagnostics.md
          - ARIMA: reference/model-cards/arima.md
          - Spectral analysis: reference/model-cards/spectral.md
          - Volatility: reference/model-cards/volatility.md
          - VAR / SVAR: reference/model-cards/var-svar.md
          - Local projections: reference/model-cards/local-projections.md
          - Bayesian: reference/model-cards/bayesian.md
          - GMM: reference/model-cards/gmm.md
          - Cointegration & regimes: reference/model-cards/cointegration-regime.md
          - Forecasting: reference/model-cards/forecasting.md
          - Machine learning: reference/model-cards/machine-learning.md
          - Panel: reference/model-cards/panel.md
          - Nowcasting & MIDAS: reference/model-cards/nowcasting-midas.md
          - Term structure: reference/model-cards/term-structure.md
          - Realized volatility: reference/model-cards/realized-vol.md
          - Predictive regressions & IVX: reference/model-cards/predictive-regressions.md
          - Recession probability: reference/model-cards/recession.md
          - Survey expectations: reference/model-cards/expectations.md
          - Long memory: reference/model-cards/long-memory.md
          - Specification & diagnostic tests: reference/model-cards/specification-tests.md
          - Arbitrage-free Nelson-Siegel: reference/model-cards/afns.md
          - DSGE (linear RE solver): reference/model-cards/dsge.md
          - Quantile regression & growth-at-risk: reference/model-cards/quantile.md
