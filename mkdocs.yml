site_name: tsecon
site_description: A high-performance, Rust-core time series econometrics library for Python.
docs_dir: docs
repo_url: https://github.com/cacoleman16/tsecon
repo_name: tsecon
edit_uri: ""

# Internal planning specs, the standalone interactive demo, and build helpers
# live under docs/ for the repo but are not part of the published site.
exclude_docs: |
  roadmap/
  demo/
  _hooks/
  gen_api_reference.py
  requirements.txt

# Rewrite repo-relative links that escape docs/ to absolute GitHub URLs.
hooks:
  - docs/_hooks/repo_links.py

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Which model when?: which-model-when.md
  - Guide:
