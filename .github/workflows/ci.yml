name: CI

# Test the Rust core and the built Python wheel on every push and PR.
# The wheel is tested in a clean environment (installed, not `maturin develop`)
# so packaging bugs — missing stub, wrong module name, un-included data — are
# caught here, not by users. See docs/roadmap/14-packaging-distribution.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  python:
    name: Python wheel (${{ matrix.os }})
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      # Build the abi3 wheel, install it, and run the test suite against the
      # installed artifact — not a `maturin develop` editable install — so
      # packaging bugs (missing stub, wrong module name) surface here.
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          args: --release --out dist
      - name: Install wheel and run tests
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest numpy scipy
          python -m pip install --no-index --find-links bindings/python/dist tsecon
          # Prove the INSTALLED wheel is under test, not repo source. Since the
          # mixed-layout refactor there IS a source package at
          # bindings/python/python/tsecon/, so shadowing is now genuinely
          # possible if sys.path ever picks that directory up — this assertion
          # is the guard against silently testing the source tree instead.
          python -c "import tsecon, pathlib; assert 'site-packages' in tsecon.__file__, tsecon.__file__; print('testing wheel at', tsecon.__file__)"
          # Run the tests in place so their repo-relative fixture paths
          # (Path(__file__).parents[3] / 'fixtures') resolve correctly.
          python -m pytest bindings/python/tests -q

  typecheck:
    name: Type-stub check (mypy accepts the stubs)
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: Build + install wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          args: --release --out dist
      - run: |
          python -m pip install --upgrade pip mypy numpy
          python -m pip install --no-index --find-links bindings/python/dist tsecon
          # A tiny script that exercises typed signatures; mypy must accept it.
          cat > _typecheck.py <<'PY'
          import numpy as np
          import tsecon
          y: np.ndarray = np.arange(100.0)
          rep = tsecon.check_stationarity(y)
          rec: str = str(rep["recommendation"])
          r = tsecon.arima_fit(y, p=1, d=1, q=1, forecast_steps=8, conf_alpha=0.1)
          PY
          mypy --strict --ignore-missing-imports _typecheck.py

  evidence:
    name: Evidence (Monte Carlo + cross-library parity)
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: Build + install wheel (release — timings are meaningless otherwise)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          args: --release --out dist
      - name: Install
        run: |
          # Every reference the parity matrix compares against must be present,
          # or the gate silently covers less than it claims. bench.py reports
          # any it cannot find, but CI should never exercise that path.
          python -m pip install --upgrade pip numpy scipy statsmodels arch scikit-learn
          python -m pip install --no-index --find-links bindings/python/dist tsecon
      # The Monte Carlo suites are seeded and assert their own expectations, so a
      # statistical regression (a test losing its size, an interval losing
      # coverage) fails the build instead of quietly rotting in the docs.
      - name: Monte Carlo validation suite
        run: python docs/examples/monte_carlo.py
      - name: Frontier Monte Carlo
        run: python docs/examples/monte_carlo_frontier.py
      # bench.py exits non-zero if ANY cross-library parity check fails. Timings
      # are reported but never gate; only agreement with statsmodels/arch does.
      - name: Cross-library parity gate
        run: python benchmarks/bench.py

  abi3:
    name: abi3 wheel runs on Python ${{ matrix.python-version }}
    needs: rust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The wheel is built abi3-py39 and pyproject declares requires-python
        # ">=3.9". That promise was previously asserted but never tested — CI
        # only ever ran 3.12. Build ONE wheel and import/test it on the oldest
        # and newest supported interpreters, which is exactly what abi3 claims.
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      # Build with a single fixed interpreter; abi3 means the artifact is not
      # tied to it. Testing under a DIFFERENT interpreter is the whole point.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the abi3 wheel (on 3.12)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          args: --release --out dist
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install that same wheel on ${{ matrix.python-version }} and test
        run: |
          python -VV
          # Test deps come from PyPI (scipy is needed by test_intervals.py, which
          # pins interval multipliers to scipy.stats.norm.ppf).
          python -m pip install --upgrade pip pytest numpy scipy
          # tsecon, by contrast, must resolve to the wheel built above and never
          # to PyPI or the source tree — hence --no-index.
          python -m pip install --no-index --find-links bindings/python/dist tsecon
          python -c "import tsecon, sys; print('python', sys.version.split()[0], '->', tsecon.__file__); assert 'site-packages' in tsecon.__file__"
          python -c "import tsecon; n=len([f for f in dir(tsecon) if not f.startswith('_') and callable(getattr(tsecon,f))]); print('callables:', n); assert n == 93, n"
          python -m pytest bindings/python/tests -q
