name: Docs

# Validate that the documentation site builds cleanly, then deploy it to
# GitHub Pages. `mkdocs build --strict` fails on any broken internal link,
# missing nav entry, or stale reference, so the deployed site can never lag
# a broken build. Deployment runs only on pushes to main and requires the
# repository's Pages source to be set to "GitHub Actions"
# (Settings -> Pages -> Source).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "bindings/python/python/tsecon/__init__.pyi"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "bindings/python/python/tsecon/__init__.pyi"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate the API reference from the type stub
        run: python docs/gen_api_reference.py
      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt
      - name: Build the site (strict — fails on a broken link or nav entry)
        run: mkdocs build --strict
      - name: Upload the built site for the deploy job
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Deploy exactly what validate built — pushes to main only.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
