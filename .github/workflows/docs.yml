name: Docs

# Validate that the documentation site builds cleanly. `mkdocs build --strict`
# fails on any broken internal link, missing nav entry, or stale reference, so
# this keeps the docs honest on every push — but it does NOT deploy anywhere.
#
# Hosting is left
# off by choice. To read the site: `pip install -r docs/requirements.txt &&
# mkdocs serve` locally, or point any static host (Netlify / Cloudflare Pages,
# both free even for private repos) at `mkdocs build`.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "bindings/python/python/tsecon/__init__.pyi"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "bindings/python/python/tsecon/__init__.pyi"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate the API reference from the type stub
        run: python docs/gen_api_reference.py
      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt
      - name: Build the site (strict — fails on a broken link or nav entry)
        run: mkdocs build --strict
