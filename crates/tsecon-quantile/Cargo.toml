[package]
name = "tsecon-quantile"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Quantile regression and quantile local projections for the tsecon time-series econometrics library: check-loss estimation validated against statsmodels QuantReg, quantile LP impulse responses, and the Adrian-Boyarchenko-Giannone growth-at-risk workflow"

[dependencies]
tsecon-linalg = { path = "../tsecon-linalg" }
tsecon-hac = { path = "../tsecon-hac" }
tsecon-stats = { path = "../tsecon-stats" }

[dev-dependencies]
serde_json = { version = "1", features = ["float_roundtrip"] }
tsecon-rng = { path = "../tsecon-rng" }
