[package]
name = "tsecon-var"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Reduced-form VAR estimation and analysis for the tsecon time-series econometrics library: equation-by-equation OLS with statsmodels-convention information criteria, lag-order selection on a common sample, companion-form stability roots, Granger-causality F tests, orthogonalized and non-orthogonalized impulse responses, forecast-error variance decompositions, and iterated forecasts with asymptotic intervals"

[dependencies]
# faer is consumed through the tsecon-linalg re-export so the whole
# workspace shares one pinned version (0.24, default-features = false,
# features = ["std"]).
tsecon-linalg = { path = "../tsecon-linalg" }
tsecon-stats = { path = "../tsecon-stats" }
# Shared resampling engine (indices / par_replicate) for the residual
# bootstrap IRF bands in `src/irf_bootstrap.rs`. tsecon-bootstrap does NOT
# depend on tsecon-var, so there is no dependency cycle. tsecon-rng is the
# reproducible RNG it is built on (transitive, listed for clarity).
tsecon-bootstrap = { path = "../tsecon-bootstrap" }
tsecon-rng = { path = "../tsecon-rng" }

[dev-dependencies]
# float_roundtrip: fixture doubles must parse to the exact bit pattern NumPy
# printed, not serde_json's default 1-ulp fast path.
serde_json = { version = "1", features = ["float_roundtrip"] }
